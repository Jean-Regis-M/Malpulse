name: MallPulse CI Verification

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install UV and Synchronize Dependencies
      run: |
        pip install uv
        uv pip install --system -r backend/requirements.txt pytest pytest-asyncio
        
    - name: Execute Pytest Suites (Search & Reservation Transactional locks)
      run: |
        pytest backend/tests/
